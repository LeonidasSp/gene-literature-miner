# Fly.io config — deploy straight from this folder with `fly launch` (no GitHub needed).
# Change `app` to a globally-unique name if this one is taken.
app = "gene-literature-miner"
primary_region = "lhr"   # London; pick your nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  NCBI_EMAIL = "le.spathis@gmail.com"
  PORT = "8080"
  # Set the secret separately (never commit it):  fly secrets set NCBI_API_KEY=xxxx

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true     # scale to zero when idle (free)
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
