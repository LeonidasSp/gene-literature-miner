# Render.com Blueprint — deploys the gene miner as a public Docker web service.
# Push this folder to a GitHub repo, then on render.com: New > Blueprint > pick the repo.
services:
  - type: web
    name: gene-literature-miner
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free            # free tier sleeps after ~15 min idle; upgrade for always-on
    healthCheckPath: /health
    envVars:
      - key: NCBI_EMAIL
        value: le.spathis@gmail.com
      - key: NCBI_API_KEY   # set the value in the Render dashboard (free key from NCBI)
        sync: false
